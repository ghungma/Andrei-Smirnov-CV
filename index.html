<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Andrei Smirnov</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }

    section {
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 20px;
    }

    h1 {
      font-size: 48px;
      font-weight: 500;
      margin: 0 0 10px;
    }

    h2 {
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: 0.5;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      opacity: 0.85;
      margin: 0;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 0;
    }

    img {
      width: 100%;
      max-width: 400px;
      display: block;
      margin-top: 30px;
      filter: grayscale(100%);
    }

    .links a {
      display: block;
      margin-bottom: 10px;
      font-size: 18px;
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      width: fit-content;
      transition: 0.3s;
    }

    .links a:hover {
      border-bottom: 1px solid #fff;
    }
  </style>
</head>

<body>

<section class="hero">
  <h1>Andrei Smirnov</h1>
  <p>музыка, движение, звук</p>
</section>

<div class="divider"></div>

<section>
  <h2>Обо мне</h2>
  <p>
    Я создаю практики, соединяющие тело, звук и внимание.
    Работаю с движением, присутствием и живой музыкой.
  </p>
</section>

<div class="divider"></div>

<section>
  <h2>Фото</h2>
  <img src="photo.jpg" alt="Andrei">
</section>

<div class="divider"></div>

<section>
  <h2>Контакты</h2>

  <div class="links">
    <a href="https://t.me/yourusername" target="_blank">Telegram</a>
    <a href="#">Instagram</a>
    <a href="mailto:your@email.com">Email</a>
  </div>
</section>

</body>
</html>
