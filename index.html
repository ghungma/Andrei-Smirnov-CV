<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrei Smirnov</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #fff;
      color: #000;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }

    section {
      max-width: 900px;
      margin: 0 auto;
      padding: 100px 20px;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 0 20px;
    }

    .hero img {
      width: 180px;
      height: 180px;
      object-fit: cover;
      border-radius: 0;
      filter: grayscale(100%);
    }

    .hero-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-size: 52px;
      margin: 0 0 10px;
      font-weight: 500;
    }

    p {
      font-size: 18px;
      margin: 0;
      opacity: 0.8;
    }

    .divider {
      height: 1px;
      background: rgba(0,0,0,0.1);
      width: 100%;
    }

    h2 {
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 20px;
    }

    .links a {
      display: block;
      margin-bottom: 12px;
      font-size: 18px;
      color: #000;
      text-decoration: none;
      width: fit-content;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .email {
      font-size: 18px;
      margin-top: 12px;
    }
  </style>
</head>

<body>

<section class="hero">
  <img src="photo.jpg" alt="Andrei">
  
  <div class="hero-text">
    <h1>Andrei Smirnov</h1>
    <p>музыка · движение · звук · практика</p>
  </div>
</section>

<div class="divider"></div>

<section>
  <h2>Обо мне</h2>
  <p>
    Я создаю практики, соединяющие тело, внимание и звук.
    Работаю с движением, состоянием и живым присутствием.
  </p>
</section>

<div class="divider"></div>

<section>
  <h2>Контакты</h2>

  <div class="links">
    <a href="https://t.me/heyandys" target="_blank">telegram</a>
    <a href="https://instagram.com/hey_andys" target="_blank">Instagram</a>
    <a href="https://linktr.ee/heyandys" target="_blank">music</a>
  </div>

  <div class="email">
    email (andysdrop@gmail.com)
  </div>
</section>

</body>
</html>
